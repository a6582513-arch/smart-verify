<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Smart Verify</title>
<style>
    :root {
        --bg: #030712;
        --panel: rgba(15, 23, 42, 0.9);
        --cyan: #06b6d4;
        --purple: #a855f7;
        --rose: #f43f5e;
        --emerald: #10b981;
        --slate: #94a3b8;
    }
    * { box-sizing: border-box; }
    body {
        width: 340px;
        margin: 0;
        font-family: 'Segoe UI', Tahoma, sans-serif;
        background: var(--bg);
        background-image: radial-gradient(at 0% 0%, rgba(99,102,241,0.18) 0, transparent 50%);
        color: #f3f4f6;
        padding: 16px;
    }
    .header {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 14px;
    }
    .header .logo {
        width: 30px; height: 30px;
        border-radius: 10px;
        background: #0f172a;
        border: 1px solid rgba(6,182,212,0.4);
        display: flex; align-items: center; justify-content: center;
        color: var(--cyan);
        font-weight: 900;
    }
    .header h1 {
        font-size: 14px;
        margin: 0;
        font-weight: 900;
        text-shadow: 0 0 8px rgba(6,182,212,0.5);
    }
    .current-url-box {
        background: rgba(2,6,23,0.6);
        border: 1px solid #1e293b;
        border-radius: 10px;
        padding: 10px;
        font-size: 11px;
        color: var(--slate);
        word-break: break-all;
        direction: ltr;
        text-align: left;
        margin-bottom: 12px;
        max-height: 55px;
        overflow-y: auto;
    }
    button.primary {
        width: 100%;
        background: var(--cyan);
        color: #030712;
        border: none;
        padding: 11px;
        border-radius: 10px;
        font-weight: 900;
        font-size: 13px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(6,182,212,0.35);
        transition: 0.2s;
    }
    button.primary:hover { filter: brightness(1.1); }
    button.primary:disabled { opacity: 0.5; cursor: not-allowed; }

    #result-area { margin-top: 14px; display: none; }
    .status-badge {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 900;
    }
    .danger { background: rgba(244,63,94,0.18); color: var(--rose); border: 1px solid rgba(244,63,94,0.4); }
    .safe { background: rgba(16,185,129,0.18); color: var(--emerald); border: 1px solid rgba(16,185,129,0.4); }

    .score-row {
        display: flex; align-items: center; justify-content: space-between;
        margin: 10px 0;
    }
    .score-value { font-size: 22px; font-weight: 900; font-family: monospace; }

    ul#reasons {
        list-style: none; padding: 0; margin: 8px 0 0 0;
        font-size: 11px; color: var(--slate);
        display: flex; flex-direction: column; gap: 6px;
    }
    ul#reasons li { display: flex; gap: 6px; align-items: flex-start; }
    ul#reasons li::before { content: "✦"; color: var(--cyan); }

    .loader {
        display: none;
        text-align: center;
        color: var(--cyan);
        font-size: 12px;
        margin-top: 10px;
    }
    .footer-link {
        display: block;
        text-align: center;
        margin-top: 14px;
        font-size: 10px;
        color: #475569;
        text-decoration: none;
    }
    .footer-link:hover { color: var(--purple); }
</style>
</head>
<body>
    <div class="header">
        <div class="logo">SV</div>
        <h1>Smart Verify — الحارس الرقمي</h1>
    </div>

    <div class="current-url-box" id="current-url">جاري قراءة الرابط الحالي...</div>

    <button class="primary" id="scan-btn">🛡️ افحص هذه الصفحة الآن</button>

    <div class="loader" id="loader">جاري الفحص عبر Smart Verify...</div>

    <div id="result-area">
        <div class="score-row">
            <span class="status-badge" id="status-badge">-</span>
            <span class="score-value" id="score-value">0%</span>
        </div>
        <ul id="reasons"></ul>
    </div>

    <a class="footer-link" href="#" id="open-dashboard">فتح لوحة التحكم الكاملة</a>

    <script src="config.js"></script>
    <script src="popup.js"></script>
</body>
</html>
